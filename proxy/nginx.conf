upstream website {
    server 127.0.0.1:8081;
}

upstream gratitude {
    server 127.0.0.1:8080;
}

upstream gratitude-api {
    server 127.0.0.1:8000;
}

# === davidjbarnes.com ===

server {
    listen 80;
    server_name davidjbarnes.com www.davidjbarnes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://davidjbarnes.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.davidjbarnes.com;

    ssl_certificate /etc/letsencrypt/live/davidjbarnes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidjbarnes.com/privkey.pem;

    return 301 https://davidjbarnes.com$request_uri;
}

server {
    listen 443 ssl;
    server_name davidjbarnes.com;

    ssl_certificate /etc/letsencrypt/live/davidjbarnes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidjbarnes.com/privkey.pem;

    location / {
        proxy_pass http://website;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass http://website;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# === gratitude.davidjbarnes.com ===

server {
    listen 80;
    server_name gratitude.davidjbarnes.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name gratitude.davidjbarnes.com;

    ssl_certificate /etc/letsencrypt/live/gratitude.davidjbarnes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gratitude.davidjbarnes.com/privkey.pem;

    location / {
        proxy_pass http://gratitude;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://gratitude-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        client_max_body_size 10M;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        proxy_pass http://gratitude;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Reject unknown hosts
server {
    listen 80 default_server;
    return 444;
}

server {
    listen 443 ssl default_server;
    ssl_certificate /etc/letsencrypt/live/davidjbarnes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidjbarnes.com/privkey.pem;
    return 444;
}
